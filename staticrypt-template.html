<!DOCTYPE html>
<html class="staticrypt-html">
<head>
  <meta charset="utf-8" />
  <title>/*[|template_title|]*/0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap');
    :root { --grey: #666; --hair: #d9d9d9; --font: "Barlow Condensed","Arial Narrow",Arial,sans-serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .staticrypt-html, .staticrypt-body { height: 100%; }

    body {
      font-family: var(--font);
      background: #e9e9e9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* Spinner */
    .staticrypt-spinner-container {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #e9e9e9;
    }
    .staticrypt-spinner {
      width: 2rem; height: 2rem;
      border: 3px solid #ccc; border-right-color: #000;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* Card */
    .staticrypt-content { width: 100%; display: flex; align-items: center; justify-content: center; }
    .page {
      background: #fff;
      width: 100%; max-width: 480px;
      box-shadow: 0 10px 40px rgba(0,0,0,.10);
      padding: 40px;
    }
    .eyebrow {
      font-size: 11px; letter-spacing: .22em;
      text-transform: uppercase; color: var(--grey); margin-bottom: 6px;
    }
    h1 {
      font-weight: 700; text-transform: uppercase;
      font-size: 36px; line-height: .96; letter-spacing: .02em;
    }
    .rule { height: 3px; background: #000; margin: 20px 0 24px; }
    .prompt {
      font-size: 13px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--grey); margin-bottom: 16px;
    }

    /* Form */
    .staticrypt-password-container { position: relative; }
    #staticrypt-password {
      width: 100%;
      border: 1px solid var(--hair);
      border-bottom: 2px solid #000;
      padding: 12px 44px 12px 14px;
      font-family: var(--font); font-size: 18px;
      letter-spacing: .08em; outline: none;
      background: #fff; color: #000;
    }
    #staticrypt-password:focus { background: #f9f9f9; }
    .staticrypt-toggle-password-visibility {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; width: 20px; height: 20px; opacity: 0.4;
    }
    .staticrypt-decrypt-button {
      width: 100%; margin-top: 16px; padding: 14px;
      background: #000; color: #fff; border: none;
      font-family: var(--font); font-weight: 700;
      font-size: 14px; letter-spacing: .18em;
      text-transform: uppercase; cursor: pointer;
    }
    .staticrypt-decrypt-button:hover { background: #222; }

    /* Remember */
    label.staticrypt-remember {
      display: flex; align-items: center;
      gap: 10px; margin-top: 14px;
      font-size: 11px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--grey);
    }
    .staticrypt-remember input[type="checkbox"] { transform: scale(1.3); }

    /* Footer */
    .foot {
      margin-top: 28px; padding-top: 14px;
      border-top: 1px solid var(--hair);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; letter-spacing: .12em;
      text-transform: uppercase; color: #bbb;
    }
    .foot .mark { font-weight: 700; color: #000; font-size: 12px; }
  </style>
</head>

        </div>

        <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
          <input id="staticrypt-remember" type="checkbox" name="remember" />
          /*[|template_remember|]*/0
        </label>

        <input type="submit" class="staticrypt-decrypt-button" value="/*[|template_button|]*/0" />
      </form>

      <div class="foot">
        <span>Vertraulich · Nur für autorisierte Personen</span>
        <span class="mark">Zimmer 4 GmbH</span>
      </div>
    </div>
  </div>

  <script>
    const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
    const templateError = "/*[|template_error|]*/0",
      templateToggleAltShow = "/*[|template_toggle_show|]*/0",
      templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
      isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
      staticryptConfig = /*[|staticrypt_config|]*/ 0;

    const templateConfig = {
      rememberExpirationKey: "staticrypt_expiration",
      rememberPassphraseKey: "staticrypt_passphrase",
      replaceHtmlCallback: null,
      clearLocalStorageCallback: null,
    };

    const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

    window.onload = async function () {
      const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
      if (!isSuccessful) {
        document.getElementById("staticrypt_loading").classList.add("hidden");
        document.getElementById("staticrypt_content").classList.remove("hidden");
        document.getElementById("staticrypt-password").focus();
        if (isRememberEnabled) {
          document.getElementById("staticrypt-remember-label").classList.remove("hidden");
        }
      }
    };

    const toggleIcon = document.querySelector(".staticrypt-toggle-password-visibility");
    const imgEyeClosed = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBkPSJNMzguOCA1LjFDMjguNC0zLjEgMTMuMy0xLjIgNS4xIDkuMlMtMS4yIDM0LjcgOS4yIDQyLjlsNTkyIDQ2NGMxMC40IDguMiAyNS41IDYuMyAzMy43LTQuMXM2LjMtMjUuNS00LjEtMzMuN0w1MjUuNiAzODYuN2MzOS42LTQwLjYgNjYuNC04Ni4xIDc5LjktMTE4LjRjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDY1LjUgNjguOCA0MDAuOCAzMiAzMjAgMzJjLTY4LjIgMC0xMjUgMjYuMy0xNjkuMyA2MC44TDM4LjggNS4xek0yMjMuMSAxNDkuNUMyNDguNiAxMjYuMiAyODIuNyAxMTIgMzIwIDExMmM3OS41IDAgMTQ0IDY0LjUgMTQ0IDE0NGMwIDI0LjktNi4zIDQ4LjMtMTcuNCA2OC43TDQwOCAyOTQuNWM4LjQtMTkuMyAxMC42LTQxLjQgNC44LTYzLjNjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zYzAgMTAuMi0yLjQgMTkuOC02LjYgMjguM2wtOTAuMy03MC44ek0zNzMgMzg5LjljLTE2LjQgNi41LTM0LjMgMTAuMS01MyAxMC4xYy03OS41IDAtMTQ0LTY0LjUtMTQ0LTE0NGMwLTYuOS41LTEzLjYgMS40LTIwLjJMODMuMSAxNjEuNUM2MC4zIDE5MS4yIDQ0IDIyMC44IDM0LjUgMjQzLjdjLTMuMyA3LjktMy4zIDE2LjcgMCAyNC42YzE0LjkgMzUuNyA0Ni4yIDg3LjcgOTMgMTMxLjFDMTc0LjUgNDQzLjIgMjM5LjIgNDgwIDMyMCA0ODBjNDcuOCAwIDg5LjktMTIuOSAxMjYuMi0zMi41TDM3MyAzODkuOXoiLz48L3N2Zz4=";
    const imgEyeOpen = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBkPSJNMjg4IDMyYy04MC44IDAtMTQ1LjUgMzYuOC0xOTIuNiA4MC42QzQ4LjYgMTU2IDE3LjMgMjA4IDIuNSAyNDMuN2MtMy4zIDcuOS0zLjMgMTYuNyAwIDI0LjZDMTcuMyAzMDQgNDguNiAzNTYgOTUuNCAzOTkuNEMxNDIuNSA0NDMuMiAyMDcuMiA0ODAgMjg4IDQ4MHMxNDUuNS0zNi44IDE5Mi42LTgwLjZjNDYuOC00My41IDc4LjEtOTUuNCA5My0xMzEuMWMzLjMtNy45IDMuMy0xNi43IDAtMjQuNmMtMTQuOS0zNS43LTQ2LjItODcuNy05My0xMzEuMUM0MzMuNSA2OC44IDM2OC44IDMyIDI4OCAzMnpNMTQ0IDI1NmExNDQgMTQ0IDAgMSAxIDI4OCAwIDE0NCAxNDQgMCAxIDEgLTI4OCAwem0xNDQtNjRjMCAzNS4zLTI4LjcgNjQtNjQgNjRjLTcuMSAwLTEzLjktMS4yLTIwLjMtMy4zYy01LjUtMS44LTExLjkgMS42LTExLjcgNy40Yy4zIDYuOSAxLjMgMTMuOCAzLjIgMjAuN2MxMy43IDUxLjIgNjYuNCA4MS42IDExNy42IDY3LjlzODEuNi02Ni40IDY3LjktMTE3LjZjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zeiIvPjwvc3ZnPg==";
    toggleIcon.addEventListener("click", function () {
      const pw = document.getElementById("staticrypt-password");
      if (pw.type === "password") {
        pw.type = "text"; toggleIcon.src = imgEyeOpen;
        toggleIcon.alt = templateToggleAltHide; toggleIcon.title = templateToggleAltHide;
      } else {
        pw.type = "password"; toggleIcon.src = imgEyeClosed;
        toggleIcon.alt = templateToggleAltShow; toggleIcon.title = templateToggleAltShow;
      }
    });

    document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const password = document.getElementById("staticrypt-password").value,
        isRememberChecked = document.getElementById("staticrypt-remember").checked;
      const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
      if (!isSuccessful) { alert(templateError); }
    });
  </script>
</body>
</html>
