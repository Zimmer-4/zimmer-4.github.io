<!DOCTYPE html>
<!-- PUBLIC-PLACEHOLDER: keine Finanzdaten, keine Mandantennamen, bewusst unverschlüsselt -->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Finanz-Reporting · Zimmer 4 GmbH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap');
    :root{--grey:#666;--hair:#d9d9d9;--font:"Barlow Condensed","Arial Narrow",Arial,sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:#e9e9e9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
    .page{background:#fff;max-width:460px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.10);padding:40px;}
    .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--grey);margin-bottom:6px;}
    h1{font-weight:700;text-transform:uppercase;font-size:30px;line-height:.98;letter-spacing:.02em;}
    .rule{height:3px;background:#000;margin:18px 0 22px;}
    p{font-size:15px;color:#333;line-height:1.5;}
    .foot{margin-top:28px;padding-top:14px;border-top:1px solid var(--hair);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;display:flex;justify-content:space-between;}
    .foot .mark{font-weight:700;color:#000;font-size:12px;}
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">Finanz-Reporting · Zimmer 4 GmbH</div>
    <h1>Vertraulicher Zugang</h1>
    <div class="rule"></div>
    <p>Ihre Finanzberichte werden hier in Kürze bereitgestellt. Sie erhalten den
       Zugang direkt von Zimmer 4.</p>
    <div class="foot">
      <span>Berichte in Vorbereitung</span>
      <span class="mark">Zimmer 4 GmbH</span>
    </div>
  </div>
</body>
</html>
